name: Upload to Launchpad PPA

on:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dput gnupg

      - name: Import GPG private key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch

      - name: Trust the GPG key fully
        run: |
          gpg --no-tty --command-fd 0 --edit-key 400B17BA6C84907C << EOTRUST
          trust
          5
          y
          quit
          EOTRUST

      - name: Configure dput
        run: |
          cat > ~/.dput.cf << 'DPUTEOF'
          [growtree-ppa]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~animesh006/ubuntu/growtree/
          login = anonymous
          allow_unsigned_uploads = 0
          DPUTEOF

      - name: Upload to Launchpad PPA
        run: |
          dput -f growtree-ppa growtree_1.0-2_source.changes
